name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli PING"
          --health-interval 10s --health-timeout 3s --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports: ['6333:6333']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npx nx run-many --target=lint --all --parallel=3

      - name: Unit tests
        run: npx nx run-many --target=test --all --parallel=2 --passWithNoTests
        env:
          MONGODB_URI: mongodb://localhost:27017/chatbot-test
          REDIS_HOST: localhost
          QDRANT_URL: http://localhost:6333
          JWT_SECRET: test-jwt-secret
          SUPER_ADMIN_KEY: test-admin-key

      - name: Build API
        run: npm run build:api

      - name: Build Admin
        run: npx nx build admin

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f apps/api/Dockerfile -t chatbot-api:ci .
