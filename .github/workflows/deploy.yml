name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build API
        run: npm run build:api

      - name: Build widget bundle
        run: node apps/widget/build.js --production

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/chatbot-api:latest
            ${{ secrets.DOCKER_USERNAME }}/chatbot-api:${{ github.sha }}

      # ── Uncomment and adapt for your hosting provider ──────────────────────
      # Railway:
      # - name: Deploy to Railway
      #   run: npx @railway/cli deploy
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # Render:
      # - name: Deploy to Render
      #   run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Deployment complete
        run: echo "✅ Image pushed — deploy hook your hosting provider here"
